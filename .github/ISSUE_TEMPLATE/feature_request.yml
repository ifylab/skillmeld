name: Feature request
description: Suggest an improvement or a new capability.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: The use case or pain this would solve. What are you trying to do?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you would like skillmeld to do.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you have tried or thought about.
    validations:
      required: false
