name: Bug report
description: Something in skillmeld behaved incorrectly.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please include enough detail to reproduce it.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you ran, what you expected, and what you got instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The command(s) and inputs. A minimal example helps most.
      placeholder: |
        1. uv run skillmeld ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: skillmeld version, Python version, OS, and whether you ran the CLI or the Claude Code skill.
      placeholder: |
        skillmeld: 0.1.0
        python: 3.12.x
        os: macOS 15 / Ubuntu 24.04 / Windows 11
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Command output or the JSON the engine printed. Redact anything private.
      render: text
    validations:
      required: false
